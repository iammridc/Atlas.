name: atlas
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: any
  auto_route: ^11.1.0
  equatable: any
  dio: ^5.9.2
  firebase_core: any
  firebase_auth: any
  get_it: any
  flutter_svg: any
  cupertino_icons: any
  logger: any
  dartz: ^0.10.1
  path_provider: ^2.0.15
  local_auth: any
  json_annotation: any
  flutter_dotenv: ^6.0.0
  fl_chart: any
  flutter_native_splash: any
  flutter_animate: ^4.5.2
  shared_preferences: ^2.5.4
  cloud_firestore: ^6.1.3
  collection: any
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  build_runner: any
  auto_route_generator: ^10.5.0
  json_serializable: any

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/svgs/
    - assets/pngs/

flutter_native_splash:
  color: "#0E0E0E"
  image: assets/pngs/light_logo_for_splash.png
  color_dark: "#FFFFFF"
  image_dark: assets/pngs/dark_logo_for_splash.png
  android: true
  ios: true
  web: false
  fullscreen: true
